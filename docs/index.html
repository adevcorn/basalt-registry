<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Basalt Plugin Registry</title>
  <link rel="stylesheet" href="style.css">
  <meta name="description" content="Browse and discover WASM plugins for the Basalt code editor.">
  <meta property="og:title" content="Basalt Plugin Registry">
  <meta property="og:description" content="Browse and discover WASM plugins for the Basalt code editor.">
  <style>
    .hero {
      padding: 36px 0 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .hero h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--text) 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 0.9rem;
      color: var(--text-2);
      max-width: 520px;
      line-height: 1.6;
    }
    .hero-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    #plugin-count-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.76rem;
      font-family: var(--mono);
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      color: var(--accent);
      margin-left: 10px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Header -->
    <header class="site-header">
      <a class="logo" href="index.html">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="20" height="20" rx="5" fill="#5cc1f5" fill-opacity="0.15"/>
          <rect x="4" y="4" width="5" height="5" rx="1.5" fill="#5cc1f5"/>
          <rect x="11" y="4" width="5" height="5" rx="1.5" fill="#5cc1f5" fill-opacity="0.5"/>
          <rect x="4" y="11" width="5" height="5" rx="1.5" fill="#5cc1f5" fill-opacity="0.5"/>
          <rect x="11" y="11" width="5" height="5" rx="1.5" fill="#5cc1f5" fill-opacity="0.25"/>
        </svg>
        Basalt Registry
      </a>
      <nav>
        <a class="btn btn-sm" href="https://github.com/adevcorn/basalt-registry" target="_blank" rel="noopener">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
          GitHub
        </a>
        <a class="btn btn-primary btn-sm" href="submit.html">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Submit Plugin
        </a>
      </nav>
    </header>

    <!-- Hero -->
    <section class="hero">
      <h1>
        Plugin Registry
        <span id="plugin-count-badge" style="display:none">
          <span id="plugin-count">0</span> plugins
        </span>
      </h1>
      <p>
        Browse community WASM plugins for the Basalt code editor.
        Install any plugin from the <strong>Registry</strong> tab in the app,
        or <a href="submit.html">submit your own</a>.
      </p>
      <div class="hero-actions">
        <a class="btn btn-primary" href="submit.html">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Submit a Plugin
        </a>
        <a class="btn" href="https://github.com/adevcorn/basalt-registry/blob/main/CONTRIBUTING.md" target="_blank" rel="noopener">
          Read the Guide
        </a>
      </div>
    </section>

    <!-- Toolbar -->
    <div class="search-bar">
      <input
        class="search-input"
        id="search"
        type="text"
        placeholder="Search by name, description, tag or capability…"
        autocomplete="off"
        spellcheck="false"
      >
      <button class="btn btn-sm" id="sort-btn" title="Toggle sort order">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/></svg>
        A–Z
      </button>
    </div>

    <!-- Capability filters -->
    <div class="filter-row" id="filters">
      <span class="pill active" data-cap="all">All</span>
      <span class="pill" data-cap="AGENT_LAUNCHER">Agent</span>
      <span class="pill" data-cap="DIAGNOSTICS">Diagnostics</span>
      <span class="pill" data-cap="HOVER">Hover</span>
      <span class="pill" data-cap="PROJECT_MODEL">Project Model</span>
    </div>

    <!-- Stats -->
    <div class="stats-bar" id="stats" style="display:none">
      Showing <strong id="showing-count">0</strong> of <strong id="total-count">0</strong> plugins
    </div>

    <!-- Plugin list -->
    <main id="cards" class="cards">
      <!-- Loading skeletons -->
      <div class="card" id="skel-1">
        <div class="card-icon skeleton" style="width:42px;height:42px"></div>
        <div class="card-body">
          <div class="skeleton" style="height:16px;width:160px;margin-bottom:8px"></div>
          <div class="skeleton" style="height:12px;width:90%;margin-bottom:6px"></div>
          <div class="skeleton" style="height:12px;width:60%"></div>
        </div>
        <div></div>
      </div>
      <div class="card" id="skel-2">
        <div class="card-icon skeleton" style="width:42px;height:42px"></div>
        <div class="card-body">
          <div class="skeleton" style="height:16px;width:140px;margin-bottom:8px"></div>
          <div class="skeleton" style="height:12px;width:80%;margin-bottom:6px"></div>
          <div class="skeleton" style="height:12px;width:50%"></div>
        </div>
        <div></div>
      </div>
    </main>

  </div><!-- /page -->

  <script>
  (() => {
    // ── Config ──────────────────────────────────────────────────────────────
    const INDEX_URL = './index.json';

    // ── State ───────────────────────────────────────────────────────────────
    let allPlugins = [];
    let activeFilter = 'all';
    let sortAZ = true;

    // ── DOM refs ────────────────────────────────────────────────────────────
    const cardsEl     = document.getElementById('cards');
    const searchEl    = document.getElementById('search');
    const statsEl     = document.getElementById('stats');
    const showingEl   = document.getElementById('showing-count');
    const totalEl     = document.getElementById('total-count');
    const countBadge  = document.getElementById('plugin-count-badge');
    const countSpan   = document.getElementById('plugin-count');
    const sortBtn     = document.getElementById('sort-btn');

    // ── Helpers ─────────────────────────────────────────────────────────────
    const CAP_ICONS = {
      AGENT_LAUNCHER: '✦',
      DIAGNOSTICS:    '⚡',
      HOVER:          '◎',
      PROJECT_MODEL:  '⬡',
    };

    function capBadge(cap) {
      return `<span class="cap-badge cap-${cap}">${CAP_ICONS[cap] ?? ''} ${cap.replace('_',' ')}</span>`;
    }

    function pluginIcon(caps) {
      if (caps.includes('AGENT_LAUNCHER')) return '✦';
      if (caps.includes('DIAGNOSTICS'))   return '⚡';
      if (caps.includes('HOVER'))         return '◎';
      if (caps.includes('PROJECT_MODEL')) return '⬡';
      return '⬡';
    }

    function renderCard(p) {
      const caps  = (p.capabilities || []).map(capBadge).join('');
      const tags  = (p.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
      const icon  = pluginIcon(p.capabilities || []);
      const home  = p.homepage
        ? `<a href="${esc(p.homepage)}" target="_blank" rel="noopener" class="btn btn-sm">Homepage</a>`
        : '';

      return `
        <article class="card">
          <div class="card-icon">${icon}</div>
          <div class="card-body">
            <div class="card-title">
              <span class="card-name">${esc(p.name)}</span>
              <span class="card-version">v${esc(p.version)}</span>
            </div>
            <p class="card-desc">${esc(p.description)}</p>
            <div class="card-meta">
              ${caps}
              ${tags}
              <span class="card-author">by ${esc(p.author)}</span>
            </div>
          </div>
          <div class="card-actions">
            ${home}
            <a class="btn btn-sm" href="${esc(p.download_url)}" download title="Download .wasm">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              .wasm
            </a>
          </div>
        </article>`;
    }

    function esc(s) {
      return String(s ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function filtered() {
      const q = searchEl.value.trim().toLowerCase();
      return allPlugins
        .filter(p => {
          if (activeFilter !== 'all' && !(p.capabilities || []).includes(activeFilter)) return false;
          if (!q) return true;
          return (
            p.name.toLowerCase().includes(q)          ||
            p.description.toLowerCase().includes(q)   ||
            (p.tags || []).some(t => t.toLowerCase().includes(q)) ||
            (p.capabilities || []).some(c => c.toLowerCase().includes(q)) ||
            (p.author || '').toLowerCase().includes(q)
          );
        })
        .sort((a, b) => sortAZ
          ? a.name.localeCompare(b.name)
          : b.name.localeCompare(a.name)
        );
    }

    function render() {
      const visible = filtered();
      statsEl.style.display = 'flex';
      showingEl.textContent = visible.length;
      totalEl.textContent   = allPlugins.length;

      if (visible.length === 0) {
        cardsEl.innerHTML = `
          <div class="empty">
            <div style="font-size:2rem;opacity:0.25">⬡</div>
            <p>No plugins match your search.</p>
          </div>`;
        return;
      }
      cardsEl.innerHTML = visible.map(renderCard).join('');
    }

    // ── Fetch ────────────────────────────────────────────────────────────────
    fetch(INDEX_URL)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        allPlugins = data.plugins || [];
        countSpan.textContent = allPlugins.length;
        countBadge.style.display = 'inline-flex';
        render();
      })
      .catch(err => {
        cardsEl.innerHTML = `
          <div class="empty">
            <div style="font-size:2rem;opacity:0.25">⚠</div>
            <p>Could not load registry. <a href="${INDEX_URL}">index.json</a></p>
            <p style="font-size:0.75rem;margin-top:6px;color:var(--text-3)">${esc(err.message)}</p>
          </div>`;
      });

    // ── Events ───────────────────────────────────────────────────────────────
    searchEl.addEventListener('input', render);

    document.getElementById('filters').addEventListener('click', e => {
      const pill = e.target.closest('.pill');
      if (!pill) return;
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      activeFilter = pill.dataset.cap;
      render();
    });

    sortBtn.addEventListener('click', () => {
      sortAZ = !sortAZ;
      sortBtn.innerHTML = sortAZ
        ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/></svg> A–Z`
        : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="18" x2="21" y2="18"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="6" x2="9" y2="6"/></svg> Z–A`;
      render();
    });
  })();
  </script>
</body>
</html>
