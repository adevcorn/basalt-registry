app = "basalt-registry-auth"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  PAGES_ORIGIN = "https://adevcorn.github.io/basalt-registry"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
